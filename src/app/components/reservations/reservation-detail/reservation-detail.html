@let details = this.details();
@if (details){
  <div class="detail">
    <pre>
      {{details.reservation | json}}
    </pre>
    <app-client-card
      [client]="details.client"
    />
    <app-shadow-card
      [shadow]="details.shadow"
    />
    <app-invoice-card
      [invoice]="details.invoice"
    />

    @for (payment of details.payments; track $index){
      <pre>
        {{payment | json}}
    </pre>
    }
  </div>
}
