<form (ngSubmit)="submitted()">
  <fieldset>
    <legend>Fechas</legend>
    <label>CheckIn</label>
    <input type="datetime-local" [formField]="reservationForm.dates.checkIn"]>
    <br>
    <label>CheckOut</label>
    <input type="datetime-local" [formField]="reservationForm.dates.checkOut"]>
    <br>
  </fieldset>
  <p>Client: {{reservation().client.name}}</p>
  <p>Shadow: {{reservation().shadow?.identifier}}</p>
  <input type="submit" value="Submit">
</form>
