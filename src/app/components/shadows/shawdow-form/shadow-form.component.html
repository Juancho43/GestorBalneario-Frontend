
@let shadow = this.shadow();

<form (submit)="submitted($event)">
  <label>Identificador</label>
  <input type="text" [formField]="shadowForm.identifier" />
<pre>
  {{shadow | json}}
</pre>
  @if (error){
    <p>
      ERROR: El identificador ya existe, por favor elija otro.
    </p>
  }
  <input type="submit" value="save">
</form>
