<div class="panel">
  <app-shadow-map
    (currentElement)="show($event)"
    initialState="viewing"
    [loadedShadows]="shadows()"
  />
  @if (currentShadow() != null) {
    <app-shadow-card
      (click)="openShadowDetailDialog()"
      [shadow]="currentShadow()"
    />
  } @else{
    <p>Haga click en una sombra para verla</p>
  }
</div>
