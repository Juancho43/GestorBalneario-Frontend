@if (shadow()!) {
  @let shadow = this.shadow()!;

  <mat-card>
    <mat-card-header>
      <mat-card-title>{{shadow?.type}} - {{shadow?.identifier}}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      {{shadow?.state}}
    <mat-chip>x:{{shadow.coords.x}}</mat-chip>
    <mat-chip>y:{{shadow.coords.y}}</mat-chip>
      @if (shadow.currentReservation){
        {{shadow.currentReservation | json}}
      }
    </mat-card-content>
  </mat-card>
}
